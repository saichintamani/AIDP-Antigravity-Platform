live_execution:
  enabled: true
  provider_fallback: true
  budget_cap_usd: 50.0  # Failsafe limit for the entire run
  
models:
  baseline_a:
    primary: "gpt-4-turbo"
    temperature: 0.1
    max_tokens: 1500
  baseline_b:
    primary: "gpt-4-turbo"
    temperature: 0.1
    max_tokens: 2000
  baseline_c_aidp:
    reasoning_model: "gpt-4-turbo"
    debate_model: "claude-3-sonnet-20240229"
    temperature: 0.3
    max_tokens: 4000

retry_policy:
  max_retries: 3
  base_backoff_sec: 2
  max_backoff_sec: 60

checkpointing:
  enabled: true
  file_path: "scratch/live_benchmark_checkpoint.json"
  auto_resume: true
