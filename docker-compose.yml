
services:
  # The Core AIDP FastAPI Backend
  aidp-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    depends_on:
      - ollama-engine
    networks:
      - antigravity-net

  # The Local LLM Engine
  ollama-engine:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - antigravity-net

  # Static Server for the 3D Frontend
  aidp-frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src/aidp/frontend:/usr/share/nginx/html
    networks:
      - antigravity-net

networks:
  antigravity-net:
    driver: bridge

volumes:
  ollama-data:
